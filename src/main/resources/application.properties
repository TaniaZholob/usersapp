vaadin.launch-browser=false
vaadin.productionMode=true
spring.application.name=com.test.usersapp

spring.sql.init.platform=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
# For Docker: Set DB_URL, DB_USERNAME, DB_PASSWORD environment variables
# For Local IDEA: Defaults to localhost PostgreSQL on port 5432
spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5432/usersdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.jpa.hibernate.ddl-auto=validate